name: CI

on:
  push:
    branches: [main, 'phase-*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: node --test test/**/*.test.mjs

      - name: Lint check (ESLint)
        run: npx eslint index.html test/**/*.mjs automation/**/*.mjs || echo "Lint warnings (non-blocking)"

  ipv6-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Start IPv6 test server
        run: |
          python3 automation/server.py --bind :: &
          sleep 2
          echo "Server started"

      - name: Verify IPv6 server responds
        run: curl -6 -s -o /dev/null -w "%{http_code}" http://[::1]:8765/ || echo "IPv6 not available on CI runner (expected)"

      - name: Run IPv6 test suite
        run: node automation/ipv6-test.mjs --server || echo "IPv6 tests skipped (CI runner may lack IPv6)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check .gitignore hygiene
        run: |
          if grep -q "package.json" .gitignore; then
            echo "ERROR: package.json is still in .gitignore"
            exit 1
          fi

      - name: Check Dockerfile SHA pinning
        run: |
          if grep -q "FROM node:20-alpine$" submit-endpoint/Dockerfile; then
            echo "ERROR: submit-endpoint/Dockerfile has unpinned base image"
            exit 1
          fi
          echo "All Dockerfiles are SHA-pinned"

      - name: Check IPv4 hardcoding
        run: |
          # Check for IPv4-as-default (BASE = 127.0.0.1), not control endpoints
          if grep -q "^const BASE = .*127\.0\.0\.1" automation/ipv6-test.mjs; then
            echo "ERROR: IPv6 test file has IPv4 hardcoded as base URL"
            exit 1
          fi
          echo "No IPv4 hardcoding in test files"

  python-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r automation/training/requirements.txt

      - name: Verify imports
        run: python3 -c "import numpy; print('numpy', numpy.__version__); import sklearn; print('sklearn', sklearn.__version__); import onnx; print('onnx', onnx.__version__)"
