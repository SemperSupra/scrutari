# Netlify configuration for Scrutari SPA + API
# deploy: npx netlify deploy --prod --dir . --functions submit-endpoint/netlify/functions

[build]
  command = "echo 'Static files only'"
  publish = "."

[functions]
  directory = "submit-endpoint/netlify/functions"

# Edge Functions
[[edge_functions]]
  function = "classify"
  path = "/api/classify"

[[edge_functions]]
  function = "honeypot"
  path = "/admin"

[[edge_functions]]
  function = "honeypot"
  path = "/admin/"

[[edge_functions]]
  function = "honeypot"
  path = "/.env"

[[edge_functions]]
  function = "honeypot"
  path = "/wp-admin"

[[edge_functions]]
  function = "honeypot"
  path = "/wp-admin/"

[[edge_functions]]
  function = "honeypot"
  path = "/backup"

[[edge_functions]]
  function = "honeypot"
  path = "/backup/"

[[edge_functions]]
  function = "honeypot"
  path = "/api/health"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
