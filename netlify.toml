[build]
  command = "echo 'Static files only'"
  publish = "."

[functions]
  directory = "submit-endpoint/netlify/functions"

# Edge: GeoIP + IP classification (replaces ipinfo.io)
[[edge_functions]]
  function = "classify"
  path = "/api/classify"

# Edge: Bot honeypots — hidden paths that only crawlers find
[[edge_functions]]
  function = "honeypot"
  path = "/admin"

[[edge_functions]]
  function = "honeypot"
  path = "/admin/"

[[edge_functions]]
  function = "honeypot"
  path = "/.env"

[[edge_functions]]
  function = "honeypot"
  path = "/wp-admin"

[[edge_functions]]
  function = "honeypot"
  path = "/wp-admin/"

[[edge_functions]]
  function = "honeypot"
  path = "/backup"

[[edge_functions]]
  function = "honeypot"
  path = "/backup/"

[[edge_functions]]
  function = "honeypot"
  path = "/api/health"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
