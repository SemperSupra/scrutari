# Redirect: /api/submit -> serverless function
[[redirects]]
  from = "/api/submit"
  to = "/.netlify/functions/submit"
  status = 200

# PoW challenge endpoint
[[redirects]]
  from = "/api/challenge"
  to = "/.netlify/functions/challenge"
  status = 200

# Security headers
[[redirects]]
  from = "/api/status"
  to = "/.netlify/functions/status"
  status = 200
[[redirects]]
  from = "/api/analysis"
  to = "/.netlify/functions/analysis"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

