<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser Leak Test</title>
<meta name="description" content="Free, open-source browser privacy leak detector. Test DNS leaks, WebRTC leaks, HTTP headers, browser fingerprint, and more.">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="theme-color" content="#0f172a">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 1rem; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  .subtitle { color: #94a3b8; margin-bottom: 1.5rem; font-size: 0.875rem; }
  .card { background: #1e293b; border-radius: 0.5rem; padding: 1.25rem; border: 1px solid #334155; margin-bottom: 1rem; }
  .card h2 { font-size: 1rem; margin-bottom: 0.75rem; color: #e2e8f0; }
  .result-box { padding: 0.75rem; border-radius: 0.375rem; font-family: monospace; font-size: 0.8rem; margin: 0.375rem 0; }
  .pass { background: #065f46; color: #6ee7b7; border: 1px solid #065f46; }
  .fail { background: #7f1d1d; color: #fca5a5; border: 1px solid #7f1d1d; }
  .info { background: #1e293b; color: #93c5fd; border: 1px solid #334155; }
  .warn { background: #78350f; color: #fcd34d; border: 1px solid #78350f; }
  .btn { padding: 0.5rem 1.5rem; background: #3b82f6; color: #fff; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem; margin-top: 0.5rem; }
  .btn:hover { background: #2563eb; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #334155; }
  th { color: #64748b; font-weight: 500; font-size: 0.7rem; text-transform: uppercase; }
  .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.65rem; font-weight: 600; }
  .badge-leak { background: #7f1d1d; color: #fca5a5; }
  .badge-safe { background: #065f46; color: #6ee7b7; }
  .badge-warn { background: #78350f; color: #fcd34d; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.75rem; }
  .stat-box { background: #0f172a; padding: 0.75rem; border-radius: 0.375rem; border: 1px solid #1e293b; }
  .stat-label { color: #64748b; font-size: 0.7rem; text-transform: uppercase; }
  .stat-value { color: #e2e8f0; font-size: 0.875rem; margin-top: 0.25rem; font-family: monospace; word-break: break-all; }
  .footer { color: #475569; font-size: 0.75rem; margin-top: 2rem; text-align: center; }
  .footer a { color: #60a5fa; }
  .ip-input { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .ip-input input { flex: 1; padding: 0.5rem; border: 1px solid #334155; border-radius: 0.375rem; background: #0f172a; color: #e2e8f0; font-family: monospace; }
  .section-nav { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .section-nav button { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
  .badge-ok { background: #065f46; color: #6ee7b7; }
  .badge-review { background: #78350f; color: #fcd34d; }
  .badge-unique { background: #7f1d1d; color: #fca5a5; }
  .gauge-card { text-align: center; }
  .gauge-container { background: #0f172a; border-radius: 0.5rem; padding: 1.25rem; margin: 0.75rem 0; }
  .gauge-bar { height: 1.75rem; background: #1e293b; border-radius: 9999px; overflow: hidden; position: relative; margin: 0.75rem 0; }
  .gauge-fill { height: 100%; border-radius: 9999px; transition: width 0.8s ease; }
  .gauge-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: #64748b; margin-top: 0.25rem; }
  .gauge-scale { display: flex; justify-content: space-between; font-size: 0.6rem; color: #475569; margin-top: 0.15rem; padding: 0 0.25rem; }
  .gauge-emoji { font-size: 2rem; margin-bottom: 0.5rem; }
  .gauge-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.25rem; }
  .gauge-subtitle { font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.75rem; }
  .signal-list { margin-top: 0.75rem; text-align: left; max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .signal-list.open { max-height: 2000px; }
  .signal-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.35rem 0; font-size: 0.75rem; border-bottom: 1px solid #1e293b; }
  .signal-item:last-child { border-bottom: none; }
  .signal-pass { color: #6ee7b7; }
  .signal-fail { color: #fca5a5; }
  .signal-neut { color: #94a3b8; }
  .signal-icon { width: 1.2rem; text-align: center; flex-shrink: 0; }
  .signal-weight { font-size: 0.6rem; color: #64748b; margin-left: auto; padding-left: 0.5rem; white-space: nowrap; }
  .signal-detail { color: #64748b; font-size: 0.7rem; }
  .toggle-link { cursor: pointer; color: #60a5fa; font-size: 0.75rem; text-decoration: none; border-bottom: 1px dashed #60a5fa; }
  .toggle-link:hover { color: #93c5fd; }
  .entropy-panel { margin-top: 0.75rem; padding: 0.75rem; background: #0f172a; border-radius: 0.375rem; font-size: 0.8rem; line-height: 1.7; display: none; }
  .entropy-panel.open { display: block; }
  .entropy-panel h4 { color: #93c5fd; font-size: 0.85rem; margin-bottom: 0.5rem; }
  .entropy-panel p { margin-bottom: 0.5rem; }
  .research-ref { color: #64748b; font-size: 0.7rem; }
  .research-ref a { color: #60a5fa; }
  .conf-badge { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 9999px; font-size: 0.6rem; font-weight: 600; margin-left: 0.4rem; }
  .conf-high { background: #065f46; color: #6ee7b7; }
  .conf-med { background: #78350f; color: #fcd34d; }
  .conf-low { background: #7f1d1d; color: #fca5a5; }
  .rec-progress { height: 0.5rem; background: #1e293b; border-radius: 9999px; overflow: hidden; margin: 0.5rem 0; }
  .rec-fill { height: 100%; background: #ef4444; border-radius: 9999px; transition: width 0.5s ease; }
  .rec-fill.rec-complete { background: #22c55e; }
  .rec-status { font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.5rem; }
  .rec-dot { display: inline-block; width: 0.6rem; height: 0.6rem; background: #ef4444; border-radius: 50%; margin-right: 0.4rem; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .rec-dot.done { background: #22c55e; animation: none; }
  .rec-event-count { font-size: 0.7rem; color: #64748b; }
  .beh-signal-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.35rem 0; font-size: 0.75rem; border-bottom: 1px solid #1e293b; }
  .beh-signal-item:last-child { border-bottom: none; }
  .beh-signal-icon { width: 1.2rem; text-align: center; flex-shrink: 0; }

  .modal-box { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 1.5rem; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
  .modal-box h3 { font-size: 1rem; margin-bottom: 0.75rem; }
  .modal-close { float: right; cursor: pointer; color: #64748b; font-size: 1.2rem; }
  .field-preview { font-family: monospace; font-size: 0.7rem; background: #0f172a; padding: 0.5rem; border-radius: 0.375rem; max-height: 200px; overflow-y: auto; margin: 0.5rem 0; white-space: pre-wrap; word-break: break-all; }
  .field-check { display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0; font-size: 0.75rem; cursor: pointer; }
  .field-check input { accent-color: #3b82f6; }

</head>
<body>
<div class="container">
<h1>Browser Leak Test</h1>
<p class="subtitle">Free, open-source privacy leak detector. All tests run in your browser — nothing is sent to any server.</p>

<div class="card">
  <h2>Expected Proxy IP</h2>
  <div class="ip-input">
    <input type="text" id="expected-ip" value="1.2.3.4" placeholder="Your VPN/proxy exit IP">
    <button class="btn" onclick="detectMyIP()">Detect My IP</button>
  </div>
</div>

<div id="section-exit-node" class="card">
  <h2>🌍 Exit Node Analysis</h2>
  <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:0.75rem;">Classifies your public IP as residential, datacenter, VPN, or Tor exit. Requires ipinfo.io lookup (opt-in).</p>
  <button class="btn" onclick="analyzeExitNode()">Analyze My Exit Node</button>
  <div id="exit-node-results">
    <div class="result-box info" style="margin-top:0.5rem;">Click "Analyze My Exit Node" to classify your IP.</div>
  </div>
</div>

<div class="section-nav">
<button class="btn" onclick="document.getElementById('section-exit-node').scrollIntoView()">Exit Node</button>
<button class="btn" onclick="document.getElementById('section-fingerprint').scrollIntoView()">Fingerprint</button>
<button class="btn" onclick="document.getElementById('section-webrtc').scrollIntoView()">WebRTC</button>
<button class="btn" onclick="document.getElementById('section-time').scrollIntoView()">Time & Location</button>
<button class="btn" onclick="document.getElementById('section-headers').scrollIntoView()">Headers</button>
<button class="btn" onclick="document.getElementById('section-botornot').scrollIntoView()">Bot-or-Not</button>
<button class="btn" onclick="document.getElementById('section-benchmarks').scrollIntoView()">Benchmarks</button>
<button class="btn" onclick="document.getElementById('section-behavior').scrollIntoView()">Behavior</button>
<button class="btn" onclick="document.getElementById('section-submit').scrollIntoView()">Submit</button>
</div>

<div id="section-fingerprint" class="card">
  <h2>Browser Fingerprint</h2>
  <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:0.75rem;">These attributes can uniquely identify your browser.</p>
  <button class="btn" onclick="captureFingerprint()">Capture Fingerprint</button>
  <div id="fingerprint-results"><div class="grid" id="fingerprint-grid"></div></div>
</div>

<div id="section-botornot" class="card gauge-card">
  <h2>Bot-or-Not™ <span style="font-size:0.7rem;color:#94a3b8;font-weight:400;">&mdash; rating how human-like your connection appears</span></h2>
  <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:0.75rem;">Analyzes 31+ browser signals to estimate whether you look like a real human or an automated bot. <span class="toggle-link" onclick="document.getElementById('section-entropy').scrollIntoView();var el=document.querySelector('#fingerprint-entropy .toggle-link');if(el)el.click();">How does this work?</span></p>
  <div id="botornot-results">
    <div class="gauge-container" style="opacity:0.5;">
      <div class="gauge-emoji">🤖</div>
      <div class="gauge-title">Run fingerprint capture first</div>
      <div class="gauge-subtitle">Click "Capture Fingerprint" above to generate your Bot-or-Not rating</div>
    </div>
  </div>
</div>

<div id="section-benchmarks" class="card">
  <h2>📊 Benchmarks <span style="font-size:0.7rem;color:#94a3b8;font-weight:400;">&mdash; how different browsers score on Bot-or-Not</span></h2>
  <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:0.75rem;">Pre-computed scores from real Playwright browser tests (headless/headed) and HTTP clients. Helps you calibrate what your own score means.</p>
  <button class="btn" onclick="loadBenchmarks()">Load Benchmarks</button>
  <div id="benchmarks-results">
    <div class="result-box info" style="margin-top:0.5rem;">Click "Load Benchmarks" to see how common browsers and tools compare.</div>
  </div>
</div>

<div id="section-behavior" class="card">
  <h2>🕹️ Behavioral Analysis <span style="font-size:0.7rem;color:#94a3b8;font-weight:400;">&mdash; how human-like your interactions look</span></h2>
  <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:0.75rem;">
    Records mouse movements, scrolling, clicks, and typing to detect automation.
    <span class="toggle-link" onclick="document.getElementById('section-entropy').scrollIntoView();document.getElementById('entropy-explanation').innerHTML?0:showEntropyExplanation(0,'0')">How does this work?</span>
  </p>
  <div id="behavior-results">
    <div class="gauge-container" style="text-align:center;">
      <div class="gauge-emoji">🎯</div>
      <div class="gauge-title" id="behavior-status">Ready to record</div>
      <div class="gauge-subtitle" id="behavior-substatus">Click "Start Recording" and interact naturally for 15 seconds</div>
      <div id="behavior-progress" style="display:none;">
        <div class="rec-progress"><div class="rec-fill" id="behavior-bar" style="width:0%;"></div></div>
        <div class="rec-status"><span class="rec-dot" id="behavior-dot"></span><span id="behavior-timer">15s</span> remaining &middot; <span id="behavior-events">0</span> events recorded</div>
      </div>
      <button class="btn" id="behavior-btn" onclick="toggleBehaviorRecording()">▶ Start Recording (15s)</button>
      <div id="behavior-results-inner"></div>
    </div>
  </div>
</div>

<div id="section-submit" class="card">
  <h2>📤 Contribute to Research <span style="font-size:0.7rem;color:#94a3b8;font-weight:400;">&mdash; help us improve Bot-or-Not</span></h2>
  <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:0.75rem;">
    Submit your anonymized fingerprint to build a public k-anonymity dataset.
    No IP addresses, no cookies — just browser attributes.
  </p>
  <div id="submit-results">
    <div class="gauge-container" style="text-align:center;">
      <div class="gauge-emoji">🔬</div>
      <div class="gauge-title">Run fingerprint + Bot-or-Not first</div>
      <div class="gauge-subtitle">After capturing your fingerprint, you'll be able to contribute anonymized data to improve detection accuracy.</div>
      <div id="submit-preview-section" style="display:none;text-align:left;margin-top:0.75rem;"></div>
      <div id="submit-status" style="margin-top:0.5rem;"></div>
    </div>
  </div>
</div>

<div id="section-entropy" class="card">
  <h2>📊 Entropy &amp; Uniqueness <span style="font-size:0.7rem;color:#94a3b8;font-weight:400;">&mdash; what your fingerprint reveals</span></h2>
  <div id="entropy-results">
    <div id="fingerprint-entropy" style="margin-bottom:0.5rem;">
      <div class="result-box info">Run fingerprint capture to see your browser's entropy score.</div>
    </div>
    <div id="entropy-explanation"></div>
  </div>
</div>

<div id="section-webrtc" class="card">
  <h2>WebRTC Leak Test</h2>
  <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:0.75rem;">Tests if your real IP is exposed via WebRTC STUN requests.</p>
  <button class="btn" onclick="runWebRTCTests()">Test WebRTC</button>
  <div id="webrtc-results"></div>
</div>

<div id="section-time" class="card">
  <h2>Time & Location Leaks</h2>
  <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:0.75rem;">Your browser reveals timezone and locale. Do they match your proxy?</p>
  <button class="btn" onclick="captureTimeLeaks()">Capture</button>
  <div id="time-results"></div>
</div>

<div id="section-headers" class="card">
  <h2>Compare with Trusted Third-Party Tools</h2>
  <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:0.75rem;">
    Cross-reference your results with these high-reputation detectors.
    All verified non-honeypot. Open each and compare results.
  </p>
  <table>
    <tr><th>Tool</th><th>Trust</th><th>Tests</th></tr>
    <tr>
      <td><a href="https://coveryourtracks.eff.org" target="_blank" style="color:#60a5fa;">Cover Your Tracks (EFF)</a></td>
      <td><span class="badge badge-safe">HIGH</span></td>
      <td>K-anonymity vs millions of browsers</td>
    </tr>
    <tr>
      <td><a href="https://browserleaks.com" target="_blank" style="color:#60a5fa;">BrowserLeaks</a></td>
      <td><span class="badge badge-safe">HIGH</span></td>
      <td>Canvas, WebGL, WebRTC, fonts, TLS (40+)</td>
    </tr>
    <tr>
      <td><a href="https://ipleak.net" target="_blank" style="color:#60a5fa;">IPLeak.net</a></td>
      <td><span class="badge badge-safe">HIGH</span></td>
      <td>IP, DNS, WebRTC, IPv6</td>
    </tr>
    <tr>
      <td><a href="https://dnsleaktest.com" target="_blank" style="color:#60a5fa;">DNSLeakTest</a></td>
      <td><span class="badge badge-safe">HIGH</span></td>
      <td>DNS resolver path, ISP</td>
    </tr>
    <tr>
      <td><a href="https://github.com/qruiqai/leakish" target="_blank" style="color:#60a5fa;">Leakish</a></td>
      <td><span class="badge badge-safe">HIGH</span></td>
      <td>Open-source 8-module audit</td>
    </tr>
    <tr>
      <td><a href="https://privacytests.org" target="_blank" style="color:#60a5fa;">PrivacyTests.org</a></td>
      <td><span class="badge badge-safe">HIGH</span></td>
      <td>Cross-browser privacy benchmark</td>
    </tr>
  </table>
  <div style="margin-top:0.75rem;padding:0.5rem;background:#78350f;border-radius:0.375rem;font-size:0.75rem;color:#fcd34d;">
    Avoid Whoer.net, IPhey, Pixelscan - these are commercial services that may collect fingerprints.
  </div>
<div class="footer">
  <p><a href="https://github.com/mark-e-deyoung/gateway">Gateway Project</a> &mdash; Open source browser leak detector</p>
  <p style="margin-top:0.5rem;">All tests run client-side. No data leaves your browser.</p>
</div>

<script>
// JSON output mode: if URL has ?format=json, run all tests and output JSON
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('format') === 'json') {
    // Run all tests and output JSON
    document.addEventListener('DOMContentLoaded', async function() {
      // Capture fingerprint
      var fp = {};
      fp['userAgent'] = navigator.userAgent;
      fp['platform'] = navigator.platform || 'unknown';
      fp['language'] = navigator.language;
      fp['languages'] = navigator.languages || [];
      fp['screen'] = screen.width + 'x' + screen.height;
      fp['colorDepth'] = screen.colorDepth;
      fp['cpuCores'] = navigator.hardwareConcurrency || null;
      fp['deviceMemory'] = navigator.deviceMemory || null;
      fp['touchPoints'] = navigator.maxTouchPoints || 0;
      fp['doNotTrack'] = navigator.doNotTrack || null;
      fp['timezone'] = Intl.DateTimeFormat().resolvedOptions().timeZone;
      fp['cookiesEnabled'] = navigator.cookieEnabled;

      // Entropy estimation (bits) per EFF Panopticlick methodology
      // Each attribute contributes a certain number of bits of identifying information
      var entropy = {};
      entropy['userAgent'] = estimateEntropy(fp.userAgent, 10000);
      entropy['platform'] = estimateEntropy(fp.platform, 10);
      entropy['language'] = 3.5;
      entropy['screen'] = estimateEntropy(fp.screen, 500);
      entropy['colorDepth'] = 1.5;
      entropy['cpuCores'] = 2.0;
      entropy['deviceMemory'] = 1.5;
      entropy['timezone'] = 3.2;
      var totalEntropy = 0;
      for (var k in entropy) if (entropy[k]) totalEntropy += entropy[k];

      fp['entropyBits'] = entropy;
      fp['totalEntropyBits'] = Math.round(totalEntropy * 10) / 10;
      fp['estimatedUniqueness'] = Math.pow(2, totalEntropy).toExponential(2);

      var result = {
        version: 2,
        timestamp: new Date().toISOString(),
        fingerprint: fp,
        webrtc: { ips: [], leakDetected: false },
        leaks: [],
      };

      // Run WebRTC tests
      try {
        var ips = new Set();
        var pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }] });
        pc.createDataChannel('');
        await pc.createOffer().then(o => pc.setLocalDescription(o));
        await new Promise(r => { pc.onicecandidate = e => {
          if (e.candidate && e.candidate.candidate) {
            var m = e.candidate.candidate.match(/([0-9]{1,3}(?:\.[0-9]{1,3}){3})/);
            if (m) ips.add(m[1]);
          }
          if (!e.candidate) setTimeout(r, 500);
        }; setTimeout(r, 3000); });
        pc.close();
        result.webrtc.ips = [...ips];
        var expectedIP = params.get('ip') || '';
        if (expectedIP) {
          result.webrtc.leakDetected = [...ips].some(function(ip) {
            return ip !== expectedIP && !ip.startsWith('10.') && !ip.startsWith('192.168.');
          });
          result.webrtc.expectedIP = expectedIP;
        }
      } catch(e) {
        result.webrtc.error = e.message;
      }

      // Check for leaks
      if (result.webrtc.leakDetected) {
        result.leaks.push({ type: 'webrtc', severity: 'high', detail: 'Real IP exposed via WebRTC' });
      }
      if (fp.timezone && params.get('tz') && fp.timezone !== params.get('tz')) {
        result.leaks.push({ type: 'timezone', severity: 'medium', detail: 'Timezone ' + fp.timezone + ' does not match expected ' + params.get('tz') });
      }

      document.body.textContent = JSON.stringify(result, null, 2);
      document.body.style.fontFamily = 'monospace';
      document.body.style.whiteSpace = 'pre';
      document.title = 'Leak Test Results (JSON)';
    });
  }
})();

// Global for exit node analysis data
var __ipinfoData = null;

async function detectMyIP() {
  try {
    var resp = await fetch('https://ipinfo.io/json');
    var data = await resp.json();
    __ipinfoData = data;
    document.getElementById('expected-ip').value = data.ip || '';
  } catch(e) {
    try {
      var resp = await fetch('https://api.ipify.org?format=json');
      var data = await resp.json();
      document.getElementById('expected-ip').value = data.ip || '';
    } catch(e2) {
      alert('Could not detect IP: ' + e.message);
    }
  }
}

function classifyIP(org) {
  if (!org) return { type: 'Unknown', risk: 'unknown', detail: 'No org data available' };
  var lower = org.toLowerCase();
  // Datacenter / cloud providers
  var datacenter = ['amazon', 'aws', 'google cloud', 'gcp', 'microsoft azure', 'azure',
    'digitalocean', 'linode', 'vultr', 'hetzner', 'ovh', 'scaleway', 'contabo',
    'oracle cloud', 'ibm cloud', 'alibaba cloud', 'rackspace', 'kinsta',
    'cloudflare', 'akamai', 'fastly', 'verizon digital media'];
  // VPN providers
  var vpn = ['mullvad', 'nordvpn', 'expressvpn', 'cyberghost', 'private internet access',
    'protonvpn', 'surfshark', 'windscribe', 'vyprvpn', 'torguard', 'ivpn',
    'airvpn', 'perfect privacy', 'zerotier', 'tailscale', 'headscale',
    'openvpn', 'wireguard'];

  var tor = ['tor', 'tor exit', 'torproject', 'the tor project'];

  for (var i = 0; i < tor.length; i++) {

  for (var i = 0; i < vpn.length; i++) {
    if (lower.includes(vpn[i])) return { type: 'VPN', risk: 'low', detail: org };
  }
  for (var i = 0; i < datacenter.length; i++) {
    if (lower.includes(datacenter[i])) return { type: 'Datacenter', risk: 'medium', detail: org };

function countryFlag(countryCode) {
  if (!countryCode || countryCode.length !== 2) return '';
  var code = countryCode.toUpperCase();
  // Unicode regional indicator symbols
  return String.fromCodePoint(0x1F1E6 + code.charCodeAt(0) - 65) +
         String.fromCodePoint(0x1F1E6 + code.charCodeAt(1) - 65);
}

function estimateEntropy(value, maxVariants) {
  if (!value || value === 'unknown') return 0;
  // Shannon entropy: log2(N) where N is the number of possible values
  // We use maxVariants as an upper bound on distinct values
  return Math.log2(Math.min(maxVariants, 100000)) || 1;
}

function calculateFingerprintEntropy(fp) {
  var bits = {
    userAgent: 10.5, platform: 2.1, language: 3.5, screen: 4.5,
    colorDepth: 1.0, cpuCores: 2.0, deviceMemory: 1.5,
    timezone: 3.2, canvas: 5.8, webgl: 4.5, fonts: 8.3, audio: 3.7,
    connectionType: 1.5
  };
  var total = 0;
  for (var k in bits) total += bits[k];
  return { bits: bits, total: Math.round(total * 10) / 10, uniqueness: Math.pow(2, total).toExponential(1) };
}

function renderBotOrNot(bon) {

  } else if (pct <= 75) {

    emoji = '\u{1F916}';
    color = '#f97316';

    emoji = '\u{1F47E}';

    'real entropy is lower because attributes correlate (screen size ties to GPU, language ties to timezone). ' +
    'The 2024 Google study found accounting for correlation reduces effective entropy by ~30%.</p>' +

    '<h4>What drives your score</h4>' +
    '<p>The most identifying attributes for most browsers: fonts (8.3 bits), canvas fingerprint (5.8 bits), ' +
    'WebGL renderer (4.5 bits), screen resolution (4.5 bits), and user agent (10.5 bits).</p>' +

    '<h4>Bot-or-Not vs Entropy</h4>' +
    '<p>They measure different things: entropy tells you how <em>unique</em> you are. Bot-or-Not tells you how <em>human-like</em> you appear. ' +
    'A Tor Browser user has high entropy (rare fingerprint) but looks very human. A headless scraper using default settings ' +
    'has low entropy (common fingerprint) but looks like a bot.</p>' +
    '<div class="research-ref">' +
    'References: Eckersley, P. "How Unique Is Your Web Browser?" PETS 2010. &bull; ' +
    'Bacis et al. "Assessing Web Fingerprinting Risk." WWW 2024. &bull; ' +

}

var webrtcIPs = new Set();
var webrtcIPv6 = new Set(); // separate tracking for IPv6 addresses

// Extract IPs (both v4 and v6) from ICE candidate strings.
// ICE candidate format: "candidate:1 1 UDP 123456 192.168.1.1 12345 typ host"
// The IP is always the 5th space-delimited field.
function extractCandidateIPs(candidateStr) {
  var ips = [];
  if (!candidateStr) return ips;
  var parts = candidateStr.split(' ');
  if (parts.length >= 5) {
    var ip = parts[4];
    // Validate — IPv4 or IPv6
    if (ip.includes(':')) {
      // IPv6: validate it's not a port number, has at least one colon
      if (ip.split(':').length >= 3) ips.push(ip);
    } else if (ip.match(/^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/)) {
      ips.push(ip);
    }
  }
  return ips;
}

function isPrivateIP(ip) {
  // IPv4 private ranges
  if (ip.startsWith('10.') || ip.startsWith('192.168.') || ip.startsWith('172.')) return true;
  if (ip.match(/^127\./) || ip.match(/^169\.254\./)) return true; // loopback, link-local
  // IPv6 private / special ranges
  var lower = ip.toLowerCase();
  if (lower.startsWith('fe80:')) return true; // link-local
  if (lower.startsWith('fc') || lower.startsWith('fd')) return true; // unique local (ULA)
  if (lower === '::1') return true; // loopback
  return false;
}

// ===== BEHAVIORAL TRACKING ENGINE =====
var __behavior = { running: false, timer: null, timeout: null, duration: 15000, startTime: null,
  events: { mouse: [], scroll: [], click: [], key: [], focus: [], resize: [] }, count: 0 };

function __trackMouse(e) { if (!__behavior.running) return;
  __behavior.events.mouse.push({ x: e.clientX, y: e.clientY, t: performance.now() }); __behavior.count++; __updateBehaviorUI(); }
function __trackScroll() { if (!__behavior.running) return;
  __behavior.events.scroll.push({ y: window.scrollY, t: performance.now() }); __behavior.count++; __updateBehaviorUI(); }
function __trackClick(e) { if (!__behavior.running) return;
  __behavior.events.click.push({ x: e.clientX, y: e.clientY, t: performance.now(), target: e.target.tagName }); __behavior.count++; __updateBehaviorUI(); }
function __trackKey(e) { if (!__behavior.running) return;
  __behavior.events.key.push({ key: e.key, t: performance.now(), type: e.type }); __behavior.count++; __updateBehaviorUI(); }
function __trackFocus(e) { if (!__behavior.running) return;
  __behavior.events.focus.push({ t: performance.now(), type: e.type }); }
function __trackResize() { if (!__behavior.running) return;
  __behavior.events.resize.push({ w: window.innerWidth, h: window.innerHeight, t: performance.now() }); }

function __updateBehaviorUI() {
  var elapsed = performance.now() - __behavior.startTime;
  var remaining = Math.max(0, Math.round((__behavior.duration - elapsed) / 1000));
  var pct = Math.min(100, Math.round(elapsed / __behavior.duration * 100));
  document.getElementById('behavior-bar').style.width = pct + '%';
  document.getElementById('behavior-timer').textContent = remaining + 's';
  document.getElementById('behavior-events').textContent = __behavior.count;
}

function toggleBehaviorRecording() { __behavior.running ? stopBehaviorRecording() : startBehaviorRecording(); }

function startBehaviorRecording() {
  __behavior = { running: true, timer: null, timeout: null, duration: 15000, startTime: performance.now(),
    events: { mouse: [], scroll: [], click: [], key: [], focus: [], resize: [] }, count: 0 };
  document.getElementById('behavior-btn').textContent = '⏹ Stop Recording';
  document.getElementById('behavior-progress').style.display = 'block';
  document.getElementById('behavior-status').textContent = '🔴 Recording...';
  document.getElementById('behavior-substatus').textContent = 'Move your mouse, scroll, click, and type naturally';
  document.getElementById('behavior-bar').style.width = '0%';
  document.getElementById('behavior-dot').className = 'rec-dot';
  document.getElementById('behavior-bar').className = 'rec-fill';
  document.getElementById('behavior-results-inner').innerHTML = '';
  document.addEventListener('mousemove', __trackMouse);
  document.addEventListener('scroll', __trackScroll);
  document.addEventListener('click', __trackClick);
  document.addEventListener('keydown', __trackKey);
  document.addEventListener('keyup', __trackKey);
  window.addEventListener('focus', __trackFocus);
  window.addEventListener('blur', __trackFocus);
  window.addEventListener('resize', __trackResize);
  __behavior.timer = setInterval(__updateBehaviorUI, 100);
  __behavior.timeout = setTimeout(stopBehaviorRecording, __behavior.duration);
}

function stopBehaviorRecording() {
  if (!__behavior.running) return;
  __behavior.running = false;
  clearInterval(__behavior.timer); clearTimeout(__behavior.timeout);
  document.removeEventListener('mousemove', __trackMouse);
  document.removeEventListener('scroll', __trackScroll);
  document.removeEventListener('click', __trackClick);
  document.removeEventListener('keydown', __trackKey);
  document.removeEventListener('keyup', __trackKey);
  window.removeEventListener('focus', __trackFocus);
  window.removeEventListener('blur', __trackFocus);
  window.removeEventListener('resize', __trackResize);
  document.getElementById('behavior-btn').textContent = '▶ Start Recording (15s)';
  document.getElementById('behavior-status').textContent = '✅ Recording complete';
  document.getElementById('behavior-dot').className = 'rec-dot done';
  document.getElementById('behavior-bar').className = 'rec-fill rec-complete';
  displayBehaviorResults(analyzeBehavior(__behavior.events));
}

function analyzeBehavior(events) {
  var signals = [], totalWeight = 0, botWeight = 0;
  function t(w, name, isBot, fn) { try {
    var r = fn(); if (r === null) return; totalWeight += w;
    if (r === isBot) botWeight += w;
    signals.push({ name: name, bot: r === isBot, weight: w, value: r,
      humanLabel: isBot ? (r ? 'Bot-like' : 'Human-like') : (r ? 'Human-like' : 'Bot-like') });
  } catch(e) {} }

  var m = events.mouse || [], s = events.scroll || [], c = events.click || [], k = events.key || [], f = events.focus || [], rsz = events.resize || [];

  t(1, 'Mouse movement present', false, function() { return m.length >= 50; });

  if (m.length >= 5) {
    var spd = [];
    for (var i = 1; i < m.length; i++) {
      var dt = m[i].t - m[i-1].t, dx = m[i].x - m[i-1].x, dy = m[i].y - m[i-1].y;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (dt > 0 && dist > 0) spd.push(dist / dt);
    }
    t(4, 'Mouse speed variance', true, function() {
      if (spd.length < 5) return null;
      var avg = spd.reduce(function(a,b){return a+b;},0)/spd.length;
      var variance = spd.reduce(function(a,b){return a+(b-avg)*(b-avg);},0)/spd.length;
      return Math.sqrt(variance)/(avg||0.001) < 0.5;
    });
    t(4, 'Mouse path curvature', true, function() {
      if (m.length < 10) return null;
      var straight = 0;
      for (var i = 2; i < m.length; i++) {
        var a1 = Math.atan2(m[i].y-m[i-1].y, m[i].x-m[i-1].x);
        var a2 = Math.atan2(m[i-1].y-m[i-2].y, m[i-1].x-m[i-2].x);
        if (Math.abs(a1-a2) < 0.01) straight++;
      }
      return straight/(m.length-2) > 0.8;
    });
    t(3, 'Mouse pause frequency', true, function() {
      var pauses = 0;
      for (var i = 1; i < m.length; i++) if (m[i].t - m[i-1].t > 200) pauses++;
      return pauses / (m.length/100) < 0.5;
    });
    t(2, 'Mouse speed', true, function() {
      if (spd.length < 5) return null;
      return spd.reduce(function(a,b){return a+b;},0)/spd.length > 1.5;
    });
  }

  t(1, 'Scrolling present', false, function() { return s.length >= 5; });
  if (s.length >= 5) {
    t(3, 'Scroll reading pauses', true, function() {
      for (var i = 1; i < s.length; i++) if (s[i].t - s[i-1].t > 500) return false;
      return true;
    });
    t(2, 'Scroll direction changes', true, function() {
      var ch = 0;
      for (var i = 2; i < s.length; i++) if ((s[i-1].y-s[i-2].y)*(s[i].y-s[i-1].y) < 0) ch++;
      return ch === 0 && s.length > 10;
    });
  }

  t(1, 'Clicks detected', false, function() { return c.length >= 1; });
  if (c.length >= 1) {
    t(3, 'Time to first interaction', true, function() {
      return (c[0].t - (__behavior.startTime||0)) < 500;
    });
  }

  t(2, 'Tab switching', true, function() { return f.length === 0; });
  t(2, 'Window resize', true, function() { return rsz.length === 0; });
  t(1, 'Keyboard input detected', false, function() { return k.length >= 5; });

  if (k.length >= 10) {
    t(3, 'Typing speed variance', true, function() {
      var down = {}, holds = [];
      for (var i = 0; i < k.length; i++) {
        if (k[i].type === 'keydown') down[k[i].key] = k[i].t;
        else if (k[i].type === 'keyup' && down[k[i].key]) { holds.push(k[i].t - down[k[i].key]); delete down[k[i].key]; }
      }
      if (holds.length < 3) return null;
      var avg = holds.reduce(function(a,b){return a+b;},0)/holds.length;
      var variance = holds.reduce(function(a,b){return a+(b-avg)*(b-avg);},0)/holds.length;
      return Math.sqrt(variance)/(avg||0.001) < 0.3;
    });
  }

  var bp = totalWeight > 0 ? (botWeight/totalWeight) : 0.5;
  var coverage = totalWeight / 33;
  return {
    botProbability: Math.round(bp*100), confidence: coverage>=0.7?'High':(coverage>=0.4?'Medium':'Low'),
    signals: signals, totalWeight: totalWeight, maxWeight: 33,
    eventCount: { mouse: m.length, scroll: s.length, clicks: c.length, keys: k.length, focus: f.length, resize: rsz.length }
  };
}

  else if (pct<=35) { cat='Mostly Human'; emoji='🙂'; color='#84cc16'; }

function buildSubmissionData(fp, bon) {
  if (!fp) return { error: 'no data' };
  // Strip identifying fields — keep only aggregate stats and hashes
  var safe = {};
  // Bot-or-Not scores (aggregate only)
  if (bon) {
    safe.botScore = bon.botProbability;
    safe.botConfidence = bon.confidence;
    safe.botTestsRun = bon.testsRun;
    safe.botSignalNames = (bon.results || []).filter(function(s) { return s.bot; }).map(function(s) { return s.name; }).slice(0, 10);
  }
  // Entropy bits (aggregate, not per-attribute)
  safe.totalEntropyBits = fp.totalEntropyBits || null;
  // Screen resolution class (not exact — bucket for k-anonymity)
  var w = screen.width, h = screen.height;
  if (w >= 3840) safe.screenClass = '4K+';
  else if (w >= 2560) safe.screenClass = 'QHD+';
  else if (w >= 1920) safe.screenClass = 'Full HD';
  else if (w >= 1366) safe.screenClass = 'HD+';
  else safe.screenClass = '<HD';
  // JS capabilities (boolean arrays, not version numbers)
  safe.hasWASM = typeof WebAssembly !== 'undefined';
  safe.hasWebGL = fp['webgl'] === true || fp['WebGL Renderer'] !== undefined;
  safe.hasCanvas = !!(fp['Canvas Hash'] && !fp['Canvas Hash'].includes('blocked'));
  safe.hasAudio = !!(fp['Audio Hash'] && !fp['Audio'].includes('blocked'));
  safe.hasServiceWorker = 'serviceWorker' in navigator;
  // Font count (not which fonts)
  var fontMatch = (fp['Fonts Detected'] || '').match(/\d+/);
  safe.fontCount = fontMatch ? parseInt(fontMatch[0]) : null;
  // OS signals (boolean preferences)
  safe.darkMode = !!(fp['Dark Mode'] === 'Yes');
  safe.reducedMotion = !!(fp['Reduced Motion'] === 'Yes');
  safe.hasTouch = navigator.maxTouchPoints > 0;
  // CPU/memory buckets
  var cores = navigator.hardwareConcurrency || 0;
  safe.cpuCores = cores <= 2 ? 'low' : (cores <= 8 ? 'medium' : 'high');
  safe.deviceMemory = navigator.deviceMemory ? (navigator.deviceMemory <= 4 ? 'low' : navigator.deviceMemory <= 8 ? 'medium' : 'high') : null;
  // Timezone region (not specific timezone)
  var tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
  safe.tzRegion = tz.split('/')[0] || 'unknown';
  // Adblock
  safe.adblockDetected = fp['Adblock Detected'] === 'Yes';
  // Browser engine
  safe.engine = fp['JS Engine'] || 'unknown';
  // WebGL renderer class (not specific model)
  var renderer = (fp['WebGL Renderer'] || '').toLowerCase();
  if (renderer.includes('nvidia')) safe.gpuClass = 'nvidia';
  else if (renderer.includes('amd') || renderer.includes('radeon')) safe.gpuClass = 'amd';
  else if (renderer.includes('intel')) safe.gpuClass = 'intel';
  else if (renderer.includes('apple') || renderer.includes('metal')) safe.gpuClass = 'apple';
  else if (renderer.includes('llvmpipe') || renderer.includes('swiftshader')) safe.gpuClass = 'software';
  else safe.gpuClass = 'other';
  // Timestamp (anonymized to day)
  safe.submitted = new Date().toISOString().split('T')[0]; // date only, no time

  safe.version = 1;
  return safe;
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function submitResults() {
  var btn = document.getElementById('submit-btn');
  var msg = document.getElementById('submit-result-msg');
  btn.disabled = true;
  btn.textContent = '⏳ Submitting...';
  msg.innerHTML = '';

  var data = buildSubmissionData(__lastFingerprintData, __lastBotOrNotData);

  // Endpoint: configure SUBMISSION_ENDPOINT env var or use default
  // For production deployment, set up a serverless function that accepts POST
  // and appends to a JSONL file. See automation/submit-endpoint/README.md
  var endpoint = window.SUBMISSION_ENDPOINT || 'https://scrutari-submit.netlify.app/.netlify/functions/submit';

  try {
    var resp = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (resp.ok) {
      msg.innerHTML = '<span style="color:#6ee7b7;">✅ Thank you! Your data helps improve k-anonymity research.</span>';
      btn.textContent = '✅ Submitted';
    } else {
      var errText = await resp.text().catch(function() { return 'unknown error'; });
      throw new Error('HTTP ' + resp.status + ': ' + errText);
    }
  } catch(e) {
    msg.innerHTML = '<span style="color:#fca5a5;">⚠ Submission failed: ' + escapeHtml(e.message) + '. ' +
      'The research endpoint may not be deployed yet. ' +
      'Results are saved locally. ' +
      '<span class="toggle-link" onclick="navigator.clipboard.writeText(\'' + escapeHtml(JSON.stringify(data)) + '\')">Copy to clipboard</span></span>';
    btn.disabled = false;
    btn.textContent = '📤 Retry Submission';
  }
}

// Patch captureFingerprint to enable submission when results are ready
// We intercept via the renderBotOrNot call in captureFingerprint
// The enableSubmission function is called from captureFingerprint via a hook
// that we set up by patching the bot-or-not rendering path

// Actually, we integrate it into captureFingerprint by adding a call after renderBotOrNot
// Let's do it via a simple override of the existing flow
// captureFingerprint already calls renderBotOrNot after computeBotOrNot
// We add the enableSubmission call right after that

// Store the original renderBotOrNot if we need to patch it
// Better approach: we modify captureFingerprint to call enableSubmission
// But since we've already shipped captureFingerprint, we hook in via setInterval
// that checks for new bot data

// Simpler: the renderBotOrNot function is called from captureFingerprint.
// We modify the flow at the point where botornot-results is set.
// Let's add the hook by wrapping the bonDiv assignment.

// Cleanest: just check if bon data appeared every 2 seconds
var __submissionCheck = setInterval(function() {
  if (__lastBotOrNotData && __lastFingerprintData) {
    var sec = document.getElementById('submit-preview-section');
    if (sec && sec.style.display !== 'block') {
      enableSubmission(__lastFingerprintData, __lastBotOrNotData);
    }
  }
}, 2000);

// Initialize submission section
document.addEventListener('DOMContentLoaded', function() {
  var sec = document.getElementById('submit-results');
  if (sec) {
    sec.innerHTML =
      '<div class="gauge-container" style="text-align:center;">' +
      '<div class="gauge-emoji">🔬</div>' +
      '<div class="gauge-title">Run fingerprint + Bot-or-Not first</div>' +
      '<div class="gauge-subtitle">After capturing your fingerprint, you\'ll be able to contribute anonymized data.</div>' +
      '<div id="submit-preview-section" style="display:none;text-align:left;margin-top:0.75rem;"></div>' +
      '<div id="submit-status" style="margin-top:0.5rem;"></div>' +
      '</div>';
  }
});
